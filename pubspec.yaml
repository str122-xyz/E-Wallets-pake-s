name: dompet_kampus_global
description: "Aplikasi Eh-MyWallets — bayar, transfer, dan kelola uangmu dengan mudah."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.0.0
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.8.1

  # Network
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.2
  firebase_messaging: ^15.2.4
  google_sign_in: ^6.2.2

  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.4

  # QR / Camera
  mobile_scanner: ^7.0.0

  # UI Helpers
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8
  app_links: ^6.4.1
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app-icon.png"
  min_sdk_android: 21